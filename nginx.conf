server {
    listen 80;
    server_name logpike.cz www.logpike.cz;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Gzip compression configuration
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        gzip_proxied any;
        gzip_min_length 256;
    }

    # Cache control for static assets (images, fonts, stylesheets)
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|eot|ttf|css|js)$ {
        root /usr/share/nginx/html;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Disable access logs for robots.txt and favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Error handling overrides
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
